server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets (exclude /api/ paths)
    location ~* ^(?!/api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Docker embedded DNS — lets nginx resolve the backend at REQUEST time, so it
    # boots even when the backend container is down / not yet up (a literal
    # upstream would make nginx fail to start: "host not found in upstream").
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy → backend on the ts-codegram network. ${API_BACKEND} (host:port)
    # is substituted at start (envsubst); $api_upstream keeps it a runtime var.
    location /api/ {
        set $api_upstream ${API_BACKEND};
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # SPA routing — serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx-level health endpoint (container healthcheck / deploy probe).
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
