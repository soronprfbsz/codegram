name: codegram

services:
  postgres:
    image: postgres:17-alpine
    container_name: codegram-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codegram_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev}
      POSTGRES_DB: ${POSTGRES_DB:-codegram_dev}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codegram_user} -d ${POSTGRES_DB:-codegram_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - codegram-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codegram-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-codegram_user}:${POSTGRES_PASSWORD:-postgres_dev}@postgres:5432/${POSTGRES_DB:-codegram_dev}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-dev-only-not-for-production}
      JWT_LIFETIME_SECONDS: ${JWT_LIFETIME_SECONDS:-3600}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "8000:8000"
    networks:
      - codegram-network
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codegram-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - codegram-network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    driver: local

networks:
  codegram-network:
    driver: bridge
